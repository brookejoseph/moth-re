<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moth RE</title>
    <link rel="stylesheet" href="./renderer.css">
  </head>
  <body>
    <main>
      <section class="intro">
        <div class="intro-copy">
          <p class="eyebrow">Moth RE</p>
          <h1>Reverse a binary into something readable.</h1>
          <p class="lede">Assembly, symbols, strings, Objective-C metadata, and local pseudocode hints.</p>
        </div>
        <div id="dropzone" class="dropzone">
          <p class="drop-kicker">Drop binary here</p>
          <h2>Drag your file into this box</h2>
          <p>Mach-O apps, command-line tools, dylibs, and other native binaries.</p>
        </div>
      </section>

      <section id="workspace" class="workspace hidden">
        <aside>
          <div class="meta">
            <p class="eyebrow">Analysis</p>
            <h2 id="binaryName">No binary</h2>
            <p id="analysisPath"></p>
          </div>

          <label for="searchBox">Search</label>
          <div class="search-row">
            <input id="searchBox" type="search" placeholder="class, selector, string, feature">
            <select id="kindSelect">
              <option value="all">All</option>
              <option value="strings">Strings</option>
              <option value="symbols">Symbols</option>
              <option value="objc">Objective-C</option>
              <option value="functions">Functions</option>
              <option value="asm">Assembly</option>
            </select>
          </div>

          <h3>Functions</h3>
          <div id="functionList" class="list"></div>
        </aside>

        <section class="detail">
          <div class="tabs">
            <button class="tab active" data-tab="pseudocode">Pseudocode</button>
            <button class="tab" data-tab="assembly">Assembly</button>
            <button class="tab" data-tab="search">Search Results</button>
            <button class="tab" data-tab="objc">Objective-C</button>
            <button class="tab" data-tab="strings">Strings</button>
          </div>
          <pre id="detailPane"></pre>
        </section>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
